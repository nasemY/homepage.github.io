    <script lang="JavaScript">
        function name() {
            let nameA = prompt("이름을 적어주세요.");
            console.log(nameA);
            alert(`${nameA}님 환영합니다.`);
        }

        function theDate() {
            var now = new Date();
            var year = now.getFullYear();
            var month = now.getMonth() + 1;  // 월은 0부터 시작하므로 +1 해줌
            var date = now.getDate();   
            var day;

            switch(now.getDay()) {
                case 0: day = "일요일"; break;
                case 1: day = "월요일"; break;
                case 2: day = "화요일"; break;
                case 3: day = "수요일"; break;
                case 4: day = "목요일"; break;
                case 5: day = "금요일"; break;
                case 6: day = "토요일"; break;
            }

            var pm = now.getHours() - 12;

            document.write("<br> [ 접속 일자 및 시간 ]");
            document.write("<br><b>"+year+"년 "+month+"월 "+date+"일 "+day+"</b>");

            if(now.getHours() <= 12){
                document.write("<br><b>" + "오전 " + now.getHours()+"시 " + now.getMinutes()+"분 "+now.getSeconds()+"초</b>");
            }else if (now.getHours() >=12){
                document.write("<br><b>" + "오후 " + pm +"시 " + now.getMinutes()+"분 "+now.getSeconds()+"초</b>");
            }       
            }
        

        function TimeMessage() {
            var currentNow = new Date();
            var theHours = currentNow.getHours();
            var message;

            if (theHours < 6) {
                message = "늦게까지 안주무시고 방문해주셔서 감사합니다";
            } else if (theHours < 12) {
                message = "오늘도 즐거운 하루 되세요.";
            } else if (theHours < 18) {
                message = "좋은 저녁 보내세요.";
            } else {
                message = "오늘 하루도 수고하셨습니다.";
            }

            document.write(message);
        }
    </script>
